name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          python-version: 3.14
          activate-environment: sphinx-env 
          environment-file: docs/environment.yml
          use-mamba: true

      # Ensure env is active for all subsequent steps
      - name: Initialize shell for conda
        shell: bash -l {0}
        run: |
          conda info
          conda list

      # Install package into the env 
      - name: Install package
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install testing dependencies
        run: |
          pip install pytest

      - name: Run tests
        run: pytest -v